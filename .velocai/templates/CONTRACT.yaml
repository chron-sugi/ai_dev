# yaml-language-server: $schema=../schemas/CONTRACT.schema.json
# Authoring scaffold — demonstrates ONE valid contract. The schema above is the
# sole authority on validity (required blocks, enums, entry shapes); this file
# never states a constraint, it only shows a starting point. Delete every
# example block that does not apply to your domain, then replace the rest.
schema_version: 3
domain: example-domain
status: draft
summary: Replace with the domain charter and intended user-visible capability.
rules:
  - id: R-001
    statement: Replace with one atomic, checkable domain rule.
    adr: ADR-0000
rejected_alternatives:
  # Only alternatives NOT already recorded in a provenance ADR — the ADR is
  # the home for its own rejected alternatives.
  - choice: Replace with a rejected alternative
    reason: Replace with the concrete reason it lost.
adr_provenance:
  - id: ADR-0000
    path: docs/adrs/adr-0000-example.md
unresolved_gaps:
  - field: approval
    description: Review the declarations and approve the contract before scaffolding.
# Filled by the human approval act, together with flipping status to approved
# and emptying unresolved_gaps. Never authored by an agent.
# approval:
#   actor: human
#   name: project-owner
#   approved_at: 2026-01-01T00:00:00-05:00

types:
  models:
    - name: Example
      description: Domain representation of an example.
      fields:
        - name: example_id
          type: str
          description: Stable example identifier.
        - name: status
          type: ExampleStatus
          description: Current lifecycle status.
  enums:
    - name: ExampleStatus
      base: StrEnum
      description: Lifecycle state of an example.
      members:
        pending: pending
        active: active
        archived: archived
  errors:
    - name: ExampleNotFound
      description: Raised when the requested example does not exist.
  aliases:
    - name: ExampleId
      type: str
      description: Alias for the stable example identifier.

invariants:
  - id: I-001
    statement: Every Example has exactly one stable example_id.
    applies_to: [types.Example, backend, frontend]
    enforcement: Backend model validation and frontend generated types.

dependencies:
  backend:
    - other_domain
  frontend:
    - other-domain

http:
  schemas:
    - name: ExampleResponse
      description: HTTP representation returned for an example.
      fields:
        - name: example_id
          type: str
          description: Stable example identifier.
  endpoints:
    - id: example.get
      method: GET
      path: /examples/{example_id}
      operation: get_example
      response_type: ExampleResponse
      status_code: 200
      errors: [ExampleNotFound]
  backend:
    endpoint_ids: [example.get]
    dependency_providers:
      - name: get_example_repository
        provides: ExampleRepository
        description: Supply the persistence gateway to the endpoint handlers.

backend:
  package: example_domain
  public_api:
    - name: get_example
      kind: function
      signature: "get_example(example_id: str) -> Example"
      description: Return one example or raise ExampleNotFound.
  persistence:
    tables:
      - name: examples
        description: One row per example.
  service:
    operations:
      - name: get_example
        signature: "get_example(example_id: str) -> Example"
        description: Load one example or raise ExampleNotFound.
  config:
    tunables:
      - name: retention_days
        type: int
        default: 90
        description: Days a soft-deleted example is retained.
  jobs:
    entries:
      - name: prune_expired_examples
        schedule: daily
        description: Delete examples past the retention window.
  testing:
    exports:
      - name: FakeExampleStore
        kind: class
        signature: "class FakeExampleStore"
        description: In-memory fake satisfying the port-1 surface.

frontend:
  slice: example-domain
  layer: pages
  placement:
    reason: Pages-first placement gives the route one composition owner.
    consumers:
      - other-domain
  backend_package: example_domain
  public_api:
    - name: ExamplePage
      kind: component
      from_segment: ui
      signature: "function ExamplePage(): JSX.Element"
      description: Render the example page.
  route:
    path: /examples/:exampleId
    export: ExamplePage
  segments:
    ui:
      components:
        - name: ExamplePage
          props_type: ExamplePageProps
          description: Compose the example query state and presentation.
    api:
      endpoint_ids: [example.get]
      functions:
        - name: getExample
          endpoint_id: example.get
          signature: "getExample(exampleId: string): Promise<ExampleResponse>"
          description: Call the generated client for the example.get operation.
    model:
      state:
        - name: selectedExampleId
          type: "string | null"
          description: The example currently focused in the page.
    lib:
      helpers:
        - name: formatExampleStatus
          signature: "formatExampleStatus(status: ExampleStatus): string"
          description: Human-readable status label.
          consumers: [ExamplePage, ExampleStatusBadge]
